seed: 42
output_dir: outputs/pretain_8_4_8

data:
  root: /home/froshi/repositories/datasets/voxceleb2
  train_manifest: manifests/voxceleb2_train.csv
  val_manifest: manifests/voxceleb2_val.csv
  clip_len: 32
  stride: 2
  video_backend: decord
  align_mode: "off"
  align_cache_dir: null
  color_jitter: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  in_channels: 3
  input_size: [32, 112, 112]
  patch_size: [2, 16, 16]
  embed_dim: 192
  mask_ratio: 0.75
  encoder_channels: [192, 256]
  encoder_blocks: [2, 2]
  downsample_stages: [1]
  decoder_channels: 192
  prefer_spconv: true
  loss_type: mse
  visible_loss_weight: 0.05

train:
  epochs: 100
  max_steps: -1
  smoke: false
  smoke_steps: 50
  batch_size: 8
  accum_steps: 4
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 2
  amp: true
  cudnn_benchmark: true
  allow_tf32_matmul: true
  allow_tf32_cudnn: true
  float32_matmul_precision: high
  lr: null
  blr: 3.2e-3
  min_lr: 0.0
  weight_decay: 0.05
  warmup_steps: null
  warmup_epochs: 5
  log_interval: 100
  val_interval: 2000
  grad_clip: 1.0
